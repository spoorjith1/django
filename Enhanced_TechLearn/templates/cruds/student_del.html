{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/delpage.css' %}">
</head>
<body>
    <div class="delbox">
        <div class="delcard shadow-lg">

            <div class="icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>

            <h4 class="title">Confirm Deletion</h4>
            <p class="question">Are you sure you want to delete <span class="name">{{ student.full_name }}</span>?</p>

            <div class="formbox">
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                </form>
                <a href="{% url 'students' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>
</body>
</html>
