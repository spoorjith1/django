{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tables.css' %}">
</head>
<body>
    <div class="position-fixed top-0 start-0 m-3">
        <a href="{% url 'Home' %}" 
            class="d-inline-flex align-items-center gap-2 text-decoration-none text-light fs-5 px-3 py-2 rounded-3 border border-light">
            <i class="fa-solid fa-angle-left"></i> Home
        </a>
    </div>
    <h1>Courses</h1>
    <table>
        <thead>
            <tr>
                <th>Course Name</th>
                <th>Description</th>
                <th>Duration</th>
            </tr>
        </thead>
        <tbody>
            {% for c in courses %}
            <tr>
                <td>{{ c.course_name }}</td>
                <td>{{ c.description }}</td>
                <td>{{ c.duration }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
