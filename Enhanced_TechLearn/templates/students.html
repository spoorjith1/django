{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tables.css' %}">
</head>
<body>
    <div class="position-fixed top-0 start-0 m-3">
        <a href="{% url 'Home' %}" 
            class="d-inline-flex align-items-center gap-2 text-decoration-none text-light fs-5 px-3 py-2 rounded-3 border border-light">
            <i class="fa-solid fa-angle-left"></i> Home
        </a>
    </div>
    <h1>Student Data</h1>
    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Student Name</th>
                <th>Email</th>
                <th>Active?</th>
                <th>Course</th>
                <th>Trainer</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.id }}</td>
                <td>{{ s.full_name }}</td>
                <td>{{ s.email }}</td>
                <td>{{ s.is_active }}</td>
                <td>{{ s.enrolled_course }}</td>
                <td>{{ s.trainer }}</td>
                <td>
                    <div class="crudops">
                        <a href="{% url 'StudentD' s.id %}"><i class="fa-solid fa-eye"></i></a>
                        <a href="{% url 'StudentE' s.id %}"><i class="fa-solid fa-pen-to-square"></i></a>
                        <a href="{% url 'DelStd' s.id %}"><i class="fa-solid fa-trash"></i></a>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
